<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HORMO TRACE</title>

<style>

body{
background:#f9f4f7;
font-family:Arial;
margin:0;
}

header{
display:flex;
justify-content:space-between;
padding:20px 50px;
background:white;
}

.logo{
font-size:24px;
font-weight:bold;
color:#c2185b;
}

.hero{
display:flex;
justify-content:space-between;
align-items:center;
padding:60px 80px;
}

.hero-text h1{
font-size:34px;
}

.hero-text span{
color:#c2185b;
}

.primary-btn{
background:#c2185b;
color:white;
border:none;
padding:12px 25px;
border-radius:30px;
cursor:pointer;
}

.hero-image img{
width:350px;
border-radius:20px;
}

.features{
display:flex;
justify-content:center;
gap:20px;
padding:40px;
}

.feature-card{
background:white;
padding:20px 30px;
border-radius:15px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
transition:0.3s;
}

.feature-card:hover{
transform:scale(1.05);
}

footer{
text-align:center;
padding:20px;
background:white;
}

</style>
</head>

<body>

<header>
<div class="logo">HORMO TRACE</div>
</header>

<section class="hero">

<div class="hero-text">
<h1>Detect the imbalance before the body breaks the cycle</h1>
<p>Detect Early. Take Control. Stay Healthy.</p>
</div>

<div class="hero-image">
<img src="https://images.unsplash.com/photo-1607746882042-944635dfe10e?w=600">
</div>

</section>

<section class="features">

<div class="feature-card" onclick="location.href='/voice'">
🎤 Voice Analysis
</div>

<div class="feature-card" onclick="location.href='/face'">
😊 Face Recognition
</div>


</section>

<footer>
© 2026 HORMO TRACE
</footer>

</body>
</html>
